server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # "^~" (pas juste "/api/") : sans ce modificateur, un préfixe simple est TOUJOURS
    # moins prioritaire que les locations regex (~*) plus bas dans ce fichier, quel que soit
    # l'ordre d'écriture. Résultat observé en prod : /api/v1/layers/icons/xxx.svg matchait la
    # regex "\.svg$" de mise en cache statique (ligne ~29) au lieu d'être relayé vers l'API -
    # nginx cherchait alors un fichier .svg inexistant sur son propre disque -> 404 generique,
    # jamais transmis a Fastify. "^~" force ce prefixe a gagner des qu'il correspond, sans
    # meme evaluer les regles regex ensuite.
    location ^~ /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /ows {
        proxy_pass http://qgis-server:8080/ows;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;
}
