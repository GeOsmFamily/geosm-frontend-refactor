<div class="register-page">
  <mat-card class="register-card">
    <mat-card-header>
      <div class="logo-container">
        <h1 class="logo-text">GeOSM</h1>
        <p class="subtitle">Create your account</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      @if (errorMessage()) {
        <div class="error-message">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form (ngSubmit)="register()">
        <div class="name-row">
          <mat-form-field appearance="outline">
            <mat-label>First name</mat-label>
            <input matInput [(ngModel)]="firstName" name="firstName" required />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Last name</mat-label>
            <input matInput [(ngModel)]="lastName" name="lastName" required />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="new-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm password</mat-label>
          <input
            matInput
            [type]="hideConfirm ? 'password' : 'text'"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            autocomplete="new-password"
          />
          <mat-icon matPrefix>lock_outline</mat-icon>
          <button mat-icon-button matSuffix (click)="hideConfirm = !hideConfirm" type="button">
            <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="full-width register-btn"
          type="submit"
          [disabled]="loading()"
        >
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Create Account
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <span class="login-link">
        Already have an account? <a routerLink="/login" class="link">Sign in</a>
      </span>
    </mat-card-actions>
  </mat-card>
</div>
