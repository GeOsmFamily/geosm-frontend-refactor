<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-container">
        <h1 class="logo-text">GeOSM</h1>
        <p class="subtitle">Plateforme Cartographique</p>
      </div>
    </mat-card-header>

    <mat-card-content>
      @if (errorMessage()) {
        <div class="error-message">
          <mat-icon>error_outline</mat-icon>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div class="forgot-password">
          <a routerLink="/login" class="link">Forgot password?</a>
        </div>

        <button
          mat-raised-button
          color="primary"
          class="full-width login-btn"
          type="submit"
          [disabled]="loading()"
        >
          @if (loading()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Login
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <span class="register-link">
        Don't have an account? <a routerLink="/register" class="link">Create account</a>
      </span>
    </mat-card-actions>
  </mat-card>
</div>
