<app-auth-card-layout [title]="'auth.forgotPasswordTitle' | translate">
  @if (!submitted()) {
    <p class="instructions">{{ 'auth.forgotPasswordInstructions' | translate }}</p>

    @if (errorMessage()) {
      <div class="error-message">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="submit()" class="forgot-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'auth.email' | translate }}</mat-label>
        <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
        <mat-icon matPrefix>email</mat-icon>
      </mat-form-field>

      <button mat-flat-button color="primary" class="full-width" type="submit" [disabled]="loading()">
        @if (loading()) {
          <mat-spinner diameter="22" color="accent"></mat-spinner>
        } @else {
          {{ 'auth.forgotPasswordSubmit' | translate }}
        }
      </button>
    </form>
  } @else {
    <mat-icon class="status-icon success">mark_email_read</mat-icon>
    <p>{{ 'auth.forgotPasswordSuccess' | translate }}</p>
  }

  <a routerLink="/login" class="back-link">{{ 'auth.backToLogin' | translate }}</a>
</app-auth-card-layout>
