<div class="tool-panel">
  <div class="tool-buttons">
    @for (tool of tools; track tool.id) {
      <button mat-icon-button
              [class.active]="activeTool === tool.id"
              [matTooltip]="tool.label"
              matTooltipPosition="left"
              (click)="toggleTool(tool.id)">
        <mat-icon>{{ tool.icon }}</mat-icon>
      </button>
    }
  </div>

  @if (activeTool) {
    <div class="tool-content">
      @switch (activeTool) {
        @case ('drawing') { <app-drawing-tool /> }
        @case ('measure') { <app-measure-tool /> }
        @case ('routing') { <app-routing-tool /> }
        @case ('export') { <app-export-tool /> }
        @case ('print') { <app-print-tool /> }
        @case ('comment') { <app-comment-tool /> }
        @case ('altimetry') { <app-altimetry-tool /> }
      }
    </div>
  }
</div>
