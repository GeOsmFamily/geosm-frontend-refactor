<div class="layer-panel">
  <mat-tab-group animationDuration="200ms">
    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>layers</mat-icon>
        <span class="tab-label">{{ 'map.catalog' | translate }}</span>
      </ng-template>
      <app-catalog-browser />
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>visibility</mat-icon>
        <span class="tab-label">{{ 'map.activeLayers' | translate }}</span>
      </ng-template>
      <app-active-layers />
    </mat-tab>

    <mat-tab>
      <ng-template mat-tab-label>
        <mat-icon>map</mat-icon>
        <span class="tab-label">{{ 'map.baseMaps' | translate }}</span>
      </ng-template>
      <app-base-map-switcher />
    </mat-tab>
  </mat-tab-group>
</div>
