@if (visible()) {
  <div class="context-menu" [style.left.px]="menuX()" [style.top.px]="menuY()">
    <ul class="menu-list">
      <li (click)="copyCoordinates()">
        <mat-icon>content_copy</mat-icon>
        <span>{{ 'contextMenu.copyCoords' | translate }}</span>
      </li>
      <li (click)="routeFrom()">
        <mat-icon>trip_origin</mat-icon>
        <span>{{ 'contextMenu.routeFrom' | translate }}</span>
      </li>
      <li (click)="routeTo()">
        <mat-icon>place</mat-icon>
        <span>{{ 'contextMenu.routeTo' | translate }}</span>
      </li>
      <li (click)="queryInfo()">
        <mat-icon>info</mat-icon>
        <span>{{ 'contextMenu.info' | translate }}</span>
      </li>
      <li (click)="addComment()">
        <mat-icon>comment</mat-icon>
        <span>{{ 'contextMenu.addComment' | translate }}</span>
      </li>
    </ul>
  </div>
}
