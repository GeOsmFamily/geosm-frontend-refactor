<div class="admin-table-wrapper glass">
  <table mat-table [dataSource]="rows" matSort (matSortChange)="sortChange.emit($event)">
    @for (col of columns; track col.key) {
      <ng-container [matColumnDef]="col.key">
        @if (col.sortable) {
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col.label }}</th>
        } @else {
          <th mat-header-cell *matHeaderCellDef>{{ col.label }}</th>
        }
        <td mat-cell *matCellDef="let row">{{ row[col.key] }}</td>
      </ng-container>
    }

    @if (hasActions) {
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <ng-container *ngTemplateOutlet="actionsTemplate ?? null; context: { $implicit: row }"></ng-container>
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  @if (loading) {
    <div class="table-loading">
      <mat-progress-spinner diameter="32" mode="indeterminate"></mat-progress-spinner>
    </div>
  } @else if (rows.length === 0) {
    <p class="table-empty">{{ 'admin.common.noResults' | translate }}</p>
  }

  <mat-paginator
    [length]="total"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[10, 20, 50, 100]"
    (page)="pageChange.emit($event)"
  ></mat-paginator>
</div>
