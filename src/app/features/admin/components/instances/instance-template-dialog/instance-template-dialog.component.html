<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <app-admin-form-dialog
    [title]="'admin.instances.templateTitle' | translate"
    [form]="form"
    [minWidth]="400"
    (canceled)="onCancel()"
  >
    <p class="hint">{{ 'admin.instances.templateHint' | translate }}</p>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.instances.name' | translate }}</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.instances.slug' | translate }}</mat-label>
      <input matInput formControlName="slug" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.instances.description' | translate }}</mat-label>
      <textarea matInput formControlName="description" rows="2"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.instances.thematiques' | translate }}</mat-label>
      <input matInput formControlName="thematiques" />
      <mat-hint>{{ 'admin.instances.thematiquesHint' | translate }}</mat-hint>
    </mat-form-field>
  </app-admin-form-dialog>
</form>
