<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <app-admin-form-dialog
    [title]="(isCreate ? 'admin.users.createTitle' : 'admin.users.editTitle') | translate"
    [form]="form"
    [minWidth]="360"
    (canceled)="onCancel()"
  >
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.users.firstName' | translate }}</mat-label>
      <input matInput formControlName="firstName" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.users.lastName' | translate }}</mat-label>
      <input matInput formControlName="lastName" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.users.email' | translate }}</mat-label>
      <input matInput type="email" formControlName="email" required />
    </mat-form-field>

    @if (isCreate) {
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'admin.users.password' | translate }}</mat-label>
        <input matInput type="password" formControlName="password" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>{{ 'admin.users.role' | translate }}</mat-label>
        <mat-select formControlName="role">
          @for (role of roles; track role) {
            <mat-option [value]="role">{{ role }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    }
  </app-admin-form-dialog>
</form>
