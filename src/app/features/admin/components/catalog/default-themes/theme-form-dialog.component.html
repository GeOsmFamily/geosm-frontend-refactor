<h2 mat-dialog-title>
  {{ (isEdit ? 'admin.catalog.editThemeTitle' : 'admin.catalog.createThemeTitle') | translate }}
</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.catalog.name' | translate }}</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.catalog.slug' | translate }}</mat-label>
      <input matInput formControlName="slug" required />
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>{{ 'admin.catalog.icon' | translate }}</mat-label>
        <input matInput formControlName="icon" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>{{ 'admin.catalog.color' | translate }}</mat-label>
        <input matInput formControlName="color" type="color" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>{{ 'admin.catalog.order' | translate }}</mat-label>
        <input matInput type="number" formControlName="order" />
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">{{ 'common.cancel' | translate }}</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
      {{ 'common.save' | translate }}
    </button>
  </mat-dialog-actions>
</form>
