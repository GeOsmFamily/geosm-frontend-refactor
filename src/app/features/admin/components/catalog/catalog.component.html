<h2 class="page-title">{{ 'admin.nav.catalog' | translate }}</h2>

<div class="instance-picker glass">
  <mat-form-field appearance="outline" subscriptSizing="dynamic">
    <mat-label>{{ 'admin.catalog.instance' | translate }}</mat-label>
    <mat-select [ngModel]="selectedInstanceId()" (ngModelChange)="onInstanceChange($event)">
      @for (instance of instances(); track instance.id) {
        <mat-option [value]="instance.id">{{ instance.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>

@if (selectedInstanceId(); as instanceId) {
  <mat-tab-group animationDuration="0ms">
    <mat-tab [label]="'admin.catalog.groupsTab' | translate">
      <app-catalog-tree [instanceId]="instanceId"></app-catalog-tree>
    </mat-tab>
    <mat-tab [label]="'admin.catalog.baseMapsTab' | translate">
      <app-base-maps [instanceId]="instanceId"></app-base-maps>
    </mat-tab>
    <mat-tab [label]="'admin.catalog.themesTab' | translate">
      <app-default-themes></app-default-themes>
    </mat-tab>
    <mat-tab [label]="'admin.catalog.toolsTab' | translate">
      <app-catalog-tools [instanceId]="instanceId"></app-catalog-tools>
    </mat-tab>
  </mat-tab-group>
}
