<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <app-admin-form-dialog [title]="titleKey | translate" [form]="form" [minWidth]="380" (cancel)="onCancel()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.catalog.name' | translate }}</mat-label>
      <input matInput formControlName="name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.catalog.slug' | translate }}</mat-label>
      <input matInput formControlName="slug" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'admin.catalog.description' | translate }}</mat-label>
      <textarea matInput formControlName="description" rows="2"></textarea>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>{{ 'admin.catalog.icon' | translate }}</mat-label>
        <input matInput formControlName="icon" placeholder="folder" />
      </mat-form-field>

      @if (isGroup) {
        <mat-form-field appearance="outline">
          <mat-label>{{ 'admin.catalog.color' | translate }}</mat-label>
          <input matInput formControlName="color" placeholder="#3B82F6" />
        </mat-form-field>
      }
    </div>
  </app-admin-form-dialog>
</form>
