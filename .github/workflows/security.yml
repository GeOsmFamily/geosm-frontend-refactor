name: Sécurité

on:
  push:
    branches: [main, dev, 'claude/**']
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Audit npm
        run: npm audit --audit-level=high || true
      - name: Rapport d'audit détaillé
        run: npm audit --json > npm-audit-report.json || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  secrets-scan:
    name: Détection de secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Installer Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Scan des secrets
        run: gitleaks detect --source . --report-format json --report-path gitleaks-report.json --verbose || true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  docker-security:
    name: Scan image Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build image Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: geosm-frontend:security-scan
      - name: Scan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'geosm-frontend:security-scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
