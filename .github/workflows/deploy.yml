name: Déploiement

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version-tag:
    name: Création du tag de version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Générer le tag de version
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          EXISTING=$(git tag -l "${DATE}.*" | sort -t. -k2 -n | tail -1)
          if [ -z "$EXISTING" ]; then
            BUILD_NUMBER=1
          else
            LAST_BUILD=$(echo "$EXISTING" | cut -d. -f2)
            BUILD_NUMBER=$((LAST_BUILD + 1))
          fi
          TAG="${DATE}.${BUILD_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  test:
    name: Tests avant déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build production
        run: npx ng build --configuration production

  build-and-push:
    name: Build et push image Docker
    runs-on: ubuntu-latest
    needs: [version-tag, test]
    steps:
      - uses: actions/checkout@v7
      - run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - name: Connexion au registre
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build et push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:${{ needs.version-tag.outputs.version }}
            ghcr.io/${{ env.REPO_LC }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Créer la release GitHub
    runs-on: ubuntu-latest
    needs: [version-tag, build-and-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Créer le tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version-tag.outputs.version }}" -m "Release ${{ needs.version-tag.outputs.version }}"
          git push origin "${{ needs.version-tag.outputs.version }}"
      - name: Générer les notes de release
        id: notes
        run: |
          PREV_TAG=$(git tag -l "*.?" --sort=-creatordate | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            CHANGES=$(git log --oneline -20)
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Créer la release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version-tag.outputs.version }}
          name: "GeOSM Frontend v${{ needs.version-tag.outputs.version }}"
          body: |
            ## Release ${{ needs.version-tag.outputs.version }}

            ### Image Docker
            ```
            ghcr.io/${{ env.REPO_LC }}:${{ needs.version-tag.outputs.version }}
            ```

            ### Changements
            ${{ steps.notes.outputs.changes }}
          draft: false
          prerelease: false
