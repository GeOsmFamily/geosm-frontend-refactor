name: Déploiement

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version-tag:
    name: Création du tag de version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Générer le tag de version
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          EXISTING=$(git tag -l "${DATE}.*" | sort -t. -k2 -n | tail -1)
          if [ -z "$EXISTING" ]; then
            BUILD_NUMBER=1
          else
            LAST_BUILD=$(echo "$EXISTING" | cut -d. -f2)
            BUILD_NUMBER=$((LAST_BUILD + 1))
          fi
          TAG="${DATE}.${BUILD_NUMBER}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "📦 Version: ${TAG}"

  test:
    name: Build et tests avant déploiement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build production
        run: npx ng build --configuration production

  build-and-push:
    name: Build et push image Docker
    runs-on: ubuntu-latest
    needs: [version-tag, test]
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v4
      - name: Convertir le nom du repo en minuscules
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v4
      - name: Connexion au registre
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build et push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:${{ needs.version-tag.outputs.version }}
            ghcr.io/${{ env.REPO_LC }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # CACHEBUST unique a chaque run : voir le commentaire dans le Dockerfile a cote de
          # "ARG CACHEBUST" - sans ca, le cache GitHub Actions (cache-from/cache-to ci-dessus)
          # peut reutiliser le layer d'injection du token Mapillary d'un run precedent (le cache
          # est indexe sur le TEXTE de la commande, pas sur la valeur du secret monte), figeant
          # silencieusement un ancien token (voire le placeholder "__MAPILLARY_TOKEN__" jamais
          # remplace) meme apres avoir corrige le secret MAPILLARY_TOKEN sur GitHub.
          build-args: |
            CACHEBUST=${{ github.run_id }}-${{ github.run_attempt }}
          secrets: |
            mapillary_token=${{ secrets.MAPILLARY_TOKEN }}

  deploy:
    name: Déploiement sur le VPS de production
    runs-on: ubuntu-latest
    needs: [version-tag, build-and-push]
    # No-op tant que le VPS de prod n'est pas configuré : voir docs/deploiement.md. Symétrique
    # du même correctif côté backend (deploy.yml) - avant ce lot, rien après build-and-push ne
    # mettait à jour un serveur réel.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Convertir le nom du repo en minuscules
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Déployer via SSH (pull + up, avec vérification post-déploiement)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: REPO_LC
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export FRONTEND_IMAGE="ghcr.io/${REPO_LC}:${{ needs.version-tag.outputs.version }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d frontend
            echo "Attente du healthcheck (jusqu'à 60s)..."
            for i in $(seq 1 15); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps -q frontend)" 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Déploiement réussi (${FRONTEND_IMAGE})"
                exit 0
              fi
              sleep 4
            done
            echo "❌ Healthcheck échoué après déploiement - revert vers :latest précédent"
            export FRONTEND_IMAGE="ghcr.io/${REPO_LC}:latest"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d frontend
            exit 1

  create-release:
    name: Créer la release GitHub
    runs-on: ubuntu-latest
    needs: [version-tag, build-and-push]
    permissions:
      contents: write
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Convertir le nom du repo en minuscules
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Créer le tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version-tag.outputs.version }}" -m "Release ${{ needs.version-tag.outputs.version }}"
          git push origin "${{ needs.version-tag.outputs.version }}"
      - name: Générer les notes de release
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "$PREV_TAG"..HEAD)
          else
            CHANGES=$(git log --oneline -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Créer la release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version-tag.outputs.version }}
          name: "GeOSM Frontend v${{ needs.version-tag.outputs.version }}"
          body: |
            ## Release ${{ needs.version-tag.outputs.version }}

            ### Image Docker
            ```
            ghcr.io/${{ env.REPO_LC }}:${{ needs.version-tag.outputs.version }}
            ```

            ### Changements
            ${{ steps.notes.outputs.changes }}
          draft: false
          prerelease: false
