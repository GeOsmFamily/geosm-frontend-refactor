name: Qualité du code

on:
  push:
    branches: [main, dev, 'claude/**']
  pull_request:
    branches: [main, dev]

jobs:
  build-check:
    name: Vérification du build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build strict
        run: npx ng build --configuration production

  format:
    name: Formatage Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  bundle-size:
    name: Taille du bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Analyse de la taille du bundle
        run: |
          npx ng build --configuration production 2>/dev/null || true
          echo "=== Taille des fichiers générés ==="
          if [ -d "dist/geosm-frontend/browser" ]; then
            du -sh dist/geosm-frontend/browser/
            echo ""
            echo "=== Fichiers JavaScript ==="
            find dist/geosm-frontend/browser/ -name "*.js" -exec du -sh {} \; | sort -rh | head -15
            echo ""
            echo "=== Fichiers CSS ==="
            find dist/geosm-frontend/browser/ -name "*.css" -exec du -sh {} \;
          fi

  i18n-check:
    name: Vérification i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérifier la parité des clés entre fr/en/es
        run: |
          # Ne se contente plus de compter les clés (deux fichiers pouvaient avoir le même
          # nombre de clés tout en étant différentes - voir l'audit i18n qui a trouvé fr/en/es
          # désynchronisés malgré des comptes proches) : diff réel des jeux de clés aplaties.
          node -e "
          const fs = require('fs');
          function flatten(o, p = '') {
            let k = [];
            for (const x in o) {
              const full = p ? p + '.' + x : x;
              if (o[x] && typeof o[x] === 'object' && !Array.isArray(o[x])) k = k.concat(flatten(o[x], full));
              else k.push(full);
            }
            return k;
          }
          const langs = ['fr', 'en', 'es'];
          const keySets = {};
          for (const lang of langs) {
            const path = 'src/assets/i18n/' + lang + '.json';
            if (!fs.existsSync(path)) { console.error('Manquant:', path); process.exit(1); }
            keySets[lang] = new Set(flatten(JSON.parse(fs.readFileSync(path, 'utf8'))));
            console.log(lang + '.json:', keySets[lang].size, 'clés');
          }
          let failed = false;
          for (const lang of langs) {
            for (const other of langs) {
              if (lang === other) continue;
              const missing = [...keySets[lang]].filter((k) => !keySets[other].has(k));
              if (missing.length > 0) {
                failed = true;
                console.error('Clés présentes dans ' + lang + '.json mais absentes de ' + other + '.json:', missing);
              }
            }
          }
          process.exit(failed ? 1 : 0);
          "
